version: "3.9"

networks:
  alphabeta: { driver: bridge }

volumes:
  postgres_data:
  strapi_uploads:

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DATABASE_NAME:-alphabeta_prod}
      POSTGRES_USER:     ${DATABASE_USERNAME:-alphabeta_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [alphabeta]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-alphabeta_user}"]
      interval: 5s
      timeout: 3s
      retries: 10

  cms:
    build:
      context: .
      dockerfile: apps/cms/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST:               0.0.0.0
      PORT:               1337
      NODE_ENV:           production
      DATABASE_HOST:      db
      DATABASE_PORT:      5432
      DATABASE_NAME:      ${DATABASE_NAME:-alphabeta_prod}
      DATABASE_USERNAME:  ${DATABASE_USERNAME:-alphabeta_user}
      DATABASE_PASSWORD:  ${DATABASE_PASSWORD:?DATABASE_PASSWORD is required}
      DATABASE_SSL:       "false"
      APP_KEYS:           ${APP_KEYS:?APP_KEYS is required}
      API_TOKEN_SALT:     ${API_TOKEN_SALT:?API_TOKEN_SALT is required}
      ADMIN_JWT_SECRET:   ${ADMIN_JWT_SECRET:?ADMIN_JWT_SECRET is required}
      JWT_SECRET:         ${JWT_SECRET:?JWT_SECRET is required}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT:?TRANSFER_TOKEN_SALT is required}
      PUBLIC_URL:         ${CMS_PUBLIC_URL:-http://localhost:1337}
    volumes:
      - strapi_uploads:/app/apps/cms/public/uploads
    ports:
      - "${CMS_PORT:-1337}:1337"
    networks: [alphabeta]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_STRAPI_URL:  ${CMS_PUBLIC_URL:-http://localhost:1337}
        VITE_CDN_URL:     ${CMS_PUBLIC_URL:-http://localhost:1337}
        VITE_PUBLIC_URL:  ${WEB_PUBLIC_URL:-http://localhost:3000}
    restart: unless-stopped
    depends_on:
      - cms
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks: [alphabeta]
