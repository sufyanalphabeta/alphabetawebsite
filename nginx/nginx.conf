worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;
    server_tokens off;             # hides nginx version from response headers

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_write:10m rate=20r/m;
    limit_req_zone $binary_remote_addr zone=web:10m       rate=60r/s;

    # ── Upstream services ─────────────────────────────────────────────────────
    upstream web_backend {
        server web:3000;
        keepalive 16;
    }
    upstream cms_backend {
        server cms:1337;
        keepalive 16;
    }

    # ── Shared SSL settings ───────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    resolver                  1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout          5s;

    # ── Security headers (applied globally) ───────────────────────────────────
    # Note: HSTS set only on HTTPS servers below
    add_header X-Frame-Options         "DENY"                             always;
    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ══════════════════════════════════════════════════════════════════════════
    # HTTP → HTTPS redirect  +  ACME challenge pass-through
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name alphabeta.com.ly www.alphabeta.com.ly cms.alphabeta.com.ly;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Nginx health check (used by docker healthcheck)
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ══════════════════════════════════════════════════════════════════════════
    # alphabeta.com.ly  — React SPA frontend
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl;
        http2  on;
        server_name alphabeta.com.ly www.alphabeta.com.ly;

        ssl_certificate     /etc/letsencrypt/live/alphabeta.com.ly/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/alphabeta.com.ly/privkey.pem;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        # www → apex redirect
        if ($host = www.alphabeta.com.ly) {
            return 301 https://alphabeta.com.ly$request_uri;
        }

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://cms.alphabeta.com.ly; connect-src 'self' https://cms.alphabeta.com.ly; frame-ancestors 'none';"
            always;

        limit_req zone=web burst=100 nodelay;

        location / {
            proxy_pass         http://web_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 30s;
        }
    }

    # ══════════════════════════════════════════════════════════════════════════
    # cms.alphabeta.com.ly  — Strapi CMS API + Admin
    # ══════════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl;
        http2  on;
        server_name cms.alphabeta.com.ly;

        ssl_certificate     /etc/letsencrypt/live/cms.alphabeta.com.ly/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/cms.alphabeta.com.ly/privkey.pem;
        ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # Accept large file uploads (media, PDFs, etc.)
        client_max_body_size 100M;

        # Rate-limit write/mutation endpoints
        location ~* ^/api/.+$ {
            limit_req zone=api_write burst=10 nodelay;

            proxy_pass         http://cms_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;
        }

        location / {
            proxy_pass         http://cms_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";
            proxy_read_timeout 60s;
        }
    }
}
