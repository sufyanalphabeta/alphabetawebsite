packages:
  - "apps/*"
allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  better-sqlite3: true
  core-js-pure: true
  esbuild: true
  sharp: true
minimumReleaseAge: 0
# trustLockfile skips supply-chain policy network checks; safe because --frozen-lockfile
# prevents new packages from being added — the lockfile is the vetted source of truth.
trustLockfile: true
# Extended timeouts for Docker builds on slow connections
fetchTimeout: 300000
fetchRetries: 10
fetchRetryMintimeout: 20000
fetchRetryMaxtimeout: 120000
